<ion-header>
  <ion-toolbar>
    <ion-title>PreçoLeite</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content">

  <!-- Hero -->
  <div class="hero-section">
    <div class="logo-wrap">
      <img src="assets/icon/logo.png" class="logo-img" />
    </div>
    <h1 class="hero-title">Bem-vindo</h1>
    <p class="hero-subtitle">Acesse sua conta PreçoLeite</p>
  </div>

  <!-- Formulário -->
  <div class="form-card">

    <div class="section-label">
      <ion-icon name="lock-closed-outline"></ion-icon>
      Acesso
    </div>

    <div class="card-group">
      <ion-item lines="none" class="custom-item">
        <ion-icon name="mail-outline" slot="start" class="field-icon"></ion-icon>
        <div class="field-wrap">
          <ion-label class="field-label">E-mail</ion-label>
          <ion-input
            [(ngModel)]="usuario"
            type="email"
            placeholder="seu@email.com"
            clearInput
            class="custom-input">
          </ion-input>
        </div>
      </ion-item>

      <div class="item-divider"></div>

      <ion-item lines="none" class="custom-item">
        <ion-icon name="lock-closed-outline" slot="start" class="field-icon"></ion-icon>
        <div class="field-wrap">
          <ion-label class="field-label">Senha</ion-label>
          <ion-input
            [(ngModel)]="senha"
            type="password"
            placeholder="••••••••"
            clearInput
            class="custom-input">
          </ion-input>
        </div>
      </ion-item>
    </div>

    <!-- Erro -->
    @if (erro) {
      <div class="alert-danger">
        <ion-icon name="alert-circle-outline"></ion-icon>
        <span>{{ erro }}</span>
      </div>
    }

    <!-- Botão Entrar -->
    <ion-button
      color="primary"
      expand="full"
      class="save-btn"
      (click)="login()"
      [disabled]="!usuario || !senha || carregando || carregandoGoogle">
      @if (carregando) {
        <ion-spinner name="crescent" slot="start"></ion-spinner>
        Entrando...
      } @else {
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Entrar
      }
    </ion-button>

    <!-- Separador -->
    <div class="divider-row">
      <span class="divider-line"></span>
      <span class="divider-text">ou</span>
      <span class="divider-line"></span>
    </div>

    <!-- Botão Google -->
    <button
      class="google-btn"
      (click)="loginComGoogle()"
      [disabled]="carregando || carregandoGoogle">
      @if (carregandoGoogle) {
        <ion-spinner name="crescent" class="google-spinner"></ion-spinner>
        <span>Conectando...</span>
      } @else {
        <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        <span>Continuar com Google</span>
      }
    </button>

    <!-- Link cadastro -->
    <ion-button
      fill="clear"
      expand="full"
      class="link-btn"
      (click)="irParaCadastro()">
      Não tem conta?
      <strong style="margin-left: 4px;">Cadastre-se</strong>
    </ion-button>

  </div>
<div class="dev-credit">
  Desenvolvido por <span>Ricardo Mesquita e Castro</span>
</div>
  <div style="height: 40px;"></div>

</ion-content>
