<ion-header>
  <ion-toolbar>
    <ion-title>Cadastro de Conta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-text color="medium">
    <h2 style="margin-top: 24px;">Crie sua Conta</h2>
  </ion-text>

  <ion-item>
    <ion-input
      [(ngModel)]="name"
      placeholder="Nome"
      clearInput>
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      [(ngModel)]="email"
      type="email"
      placeholder="Email"
      clearInput>
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      [(ngModel)]="password"
      type="password"
      placeholder="Senha"
      clearInput>
    </ion-input>
  </ion-item>

  <!-- Feedback de erro -->
  <ion-text color="danger" *ngIf="erro">
    <p style="margin-top: 8px; font-size: 14px;">{{ erro }}</p>
  </ion-text>

  <!-- Feedback de sucesso -->
  <ion-text color="success" *ngIf="sucesso">
    <p style="margin-top: 8px; font-size: 14px;">{{ sucesso }}</p>
  </ion-text>

  <ion-button
    color="primary"
    expand="full"
    style="margin-top: 16px;"
    (click)="cadastrarConta()"
    [disabled]="!name || !email || !password || carregando">
    <ion-spinner *ngIf="carregando" name="crescent" slot="start"></ion-spinner>
    {{ carregando ? 'Cadastrando...' : 'Cadastrar' }}
  </ion-button>

  <ion-button
    fill="clear"
    expand="full"
    (click)="irParaLogin()">
    Já tem uma conta? Entrar
  </ion-button>

</ion-content>
